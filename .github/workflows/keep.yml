# NotionHub generated workflow v29
name: Keep

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 触发原因
        required: false
        default: manual
      sync_mode:
        description: 同步模式
        required: false
        default: incremental
        type: choice
        options:
          - incremental
          - full
      syncMode:
        description: 同步模式（兼容旧版本）
        required: false
        default: incremental
        type: choice
        options:
          - incremental
          - full
      repair_after_sync:
        description: 全量更新后自动修复 Notion 数据
        required: false
        default: 'false'
      payload:
        description: 同步参数 JSON
        required: false
        default: '{}'
  schedule:
    - cron: '0 16 * * *'

permissions:
  contents: read

concurrency:
  group: notionhub-keep-sync-${{ github.ref_name }}
  cancel-in-progress: ${{ github.event_name == 'workflow_dispatch' }}

jobs:
  prepare:
    name: 准备 Keep 同步
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      enabled: ${{ steps.activation.outputs.enabled }}
      matrix: ${{ steps.activation.outputs.matrix }}
    env:
      KEEP_CONFIG: ${{ secrets.KEEP_CONFIG }}
    steps:
      - name: 验证运行配置并生成同步顺序
        id: activation
        env:
          SERVICE_CONFIG: ${{ secrets.KEEP_CONFIG }}
          RUNNER_SSH_KEY: ${{ secrets.NOTIONHUB_RUNNER_SSH_KEY }}
          STREAM_DEFINITIONS: '[{"key":"workout","label":"运动"},{"key":"sleep","label":"睡眠"},{"key":"heart_rate","label":"心率"},{"key":"vo2max","label":"VO2Max"},{"key":"blood_oxygen","label":"血氧"}]'
        run: |
          echo 'matrix={"include":[{"key":"disabled","label":"已跳过"}]}' >> "$GITHUB_OUTPUT"
          if [ -z "$SERVICE_CONFIG" ]; then
            echo "::warning title=Keep尚未配置::请先在插件中完成配置并保存。"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ -z "$RUNNER_SSH_KEY" ]; then
            echo "::error title=运行器配置缺失::缺少只读部署密钥，请在插件中重新连接 GitHub。"
            exit 1
          fi
          RAW_OPTIONS=$(printf '%s' "$SERVICE_CONFIG" | jq -r '.KEEP_SERVICE_OPTIONS // empty')
          export RAW_OPTIONS STREAM_DEFINITIONS
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json, os

          streams = json.loads(os.environ['STREAM_DEFINITIONS'])
          raw = os.environ.get('RAW_OPTIONS', '').strip()
          options = json.loads(raw) if raw else {}
          keys = [item['key'] for item in streams]
          enabled = options.get('enabledStreams', keys)
          order = options.get('streamOrder', keys)
          if not isinstance(enabled, list) or not enabled or len(enabled) != len(set(enabled)) or any(key not in keys for key in enabled):
              raise SystemExit('同步内容配置无效，请回到插件重新保存。')
          if not isinstance(order, list) or len(order) != len(keys) or len(order) != len(set(order)) or set(order) != set(keys):
              raise SystemExit('同步顺序配置无效，请回到插件重新保存。')
          if 'keep' == 'dida' and 'task' in enabled and 'pomodoro' in enabled and order.index('task') > order.index('pomodoro'):
              raise SystemExit('番茄需要先同步任务，请回到插件调整顺序。')
          by_key = {item['key']: item for item in streams}
          selected = [by_key[key] for key in order if key in enabled]
          print('matrix=' + json.dumps({'include': selected}, ensure_ascii=False, separators=(',', ':')))
          PY
          echo "enabled=true" >> "$GITHUB_OUTPUT"
          echo "::notice title=Keep::已按设置生成串行同步任务。"

      - name: 检查 Notion 授权
        if: steps.activation.outputs.enabled == 'true'
        env:
          SERVICE_CONFIG: ${{ secrets.KEEP_CONFIG }}
          NOTIONHUB_RUN_TOKEN: ${{ secrets.NOTIONHUB_RUN_TOKEN }}
          GITHUB_REPOSITORY_NAME: ${{ github.repository }}
        run: |
          NOTION_TOKEN=$(printf '%s' "$SERVICE_CONFIG" | jq -r '.KEEP_NOTION_TOKEN // empty')
          EXPIRES_AT=$(printf '%s' "$SERVICE_CONFIG" | jq -r '.KEEP_NOTION_DATA // "{}" | fromjson? | .expires_at // empty')
          NEED_REFRESH=false
          NOW=$(date +%s)
          if [ -n "$EXPIRES_AT" ] && [ "$EXPIRES_AT" != "null" ]; then
            EXPIRY=$(date -d "$EXPIRES_AT" +%s 2>/dev/null || printf '%s' "$EXPIRES_AT" | cut -d. -f1)
            if [ -n "$EXPIRY" ] && [ "$EXPIRY" -le "$((NOW + 300))" ] 2>/dev/null; then NEED_REFRESH=true; fi
          fi
          if [ "$NEED_REFRESH" = "false" ] && [ -n "$NOTION_TOKEN" ]; then
            STATUS=$(curl -sS -o /dev/null -w '%{http_code}' https://api.notion.com/v1/users/me               -H "Authorization: Bearer $NOTION_TOKEN" -H 'Notion-Version: 2025-09-03')
            if [ "$STATUS" = "401" ]; then NEED_REFRESH=true; fi
          fi
          if [ "$NEED_REFRESH" = "true" ]; then
            if [ -z "$NOTIONHUB_RUN_TOKEN" ]; then
              echo "::error title=Notion 授权已过期::请回到插件重新授权 Notion。"
              exit 1
            fi
            PAYLOAD=$(jq -cn --arg service "keep" --arg repository "$GITHUB_REPOSITORY_NAME" '{service:$service,repository:$repository}')
            TIMESTAMP=$(date +%s)
            NONCE=$(openssl rand -hex 16)
            BODY_SHA256=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -r | awk '{print $1}')
            SIGNING_PAYLOAD=$(printf 'POST\n/v1/github/runner/refresh-config\n%s\n%s\n%s' "$TIMESTAMP" "$NONCE" "$BODY_SHA256")
            SIGNATURE=$(printf '%s' "$SIGNING_PAYLOAD" | openssl dgst -sha256 -hmac "$NOTIONHUB_RUN_TOKEN" -r | awk '{print $1}')
            RESPONSE=$(curl -fsSL -X POST "https://i.notionhub.app/v1/github/runner/refresh-config"               -H "Authorization: Bearer $NOTIONHUB_RUN_TOKEN" -H 'Content-Type: application/json'               -H "X-NotionHub-Timestamp: $TIMESTAMP" -H "X-NotionHub-Nonce: $NONCE" -H "X-NotionHub-Signature: $SIGNATURE"               --data "$PAYLOAD")
            if [ -z "$(printf '%s' "$RESPONSE" | jq -r '.serviceConfig // empty')" ]; then
              MESSAGE=$(printf '%s' "$RESPONSE" | jq -r '.message // "Notion 授权刷新失败"')
              echo "::error title=Notion 授权刷新失败::$MESSAGE"
              exit 1
            fi
            echo "::notice title=Notion 授权已更新::后续分类将使用刷新后的授权。"
          fi

  sync_streams:
    name: 同步 Keep / ${{ matrix.label }}
    needs: prepare
    if: needs.prepare.outputs.enabled == 'true'
    strategy:
      fail-fast: true
      max-parallel: 1
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      KEEP_CONFIG: ${{ secrets.KEEP_CONFIG }}
    steps:
      - name: 获取同步程序
        uses: actions/checkout@v5
        with:
          repository: malinkang/notionhub-private-runner
          ref: runner
          ssh-key: ${{ secrets.NOTIONHUB_RUNNER_SSH_KEY }}
          persist-credentials: false
          path: runner

      - name: 配置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 安装运行依赖
        run: |
          python -m pip install --quiet --disable-pip-version-check --upgrade pip
          if [ -f runner/requirements.txt ]; then pip install --quiet --disable-pip-version-check -r runner/requirements.txt; fi
          SERVICE_REQUIREMENTS=$(cd runner && python -m notionhub_runner requirements keep)
          if [ -f "$SERVICE_REQUIREMENTS" ]; then pip install --quiet --disable-pip-version-check -r "$SERVICE_REQUIREMENTS"; fi

      - name: 同步 ${{ matrix.label }}
        id: sync
        env:
          PYTHONUNBUFFERED: '1'
          TZ: Asia/Shanghai
          NOTIONHUB_SERVICE: keep
          NOTIONHUB_CONFIG_VERSION: '23'
          RAW_ACTION_PAYLOAD: ${{ github.event.inputs.payload || '{}' }}
          INPUT_SYNC_MODE: ${{ github.event.inputs.sync_mode || github.event.inputs.syncMode || '' }}
          SUPPORTS_FULL_SYNC: 'true'
          INPUT_REPAIR_AFTER_SYNC: ${{ github.event.inputs.repair_after_sync || '' }}
          SYNC_PLAN: lifetime
          ENTITLEMENT_PLAN: lifetime
          NOTIONHUB_DEFER_MEDIA: 'true'
        run: |
          REQUESTED_SYNC_MODE=$(jq -nr --arg raw "$RAW_ACTION_PAYLOAD" --arg sync_mode "$INPUT_SYNC_MODE" '($raw | fromjson? // {}) as $payload | ($payload.syncMode // $payload.sync_mode // "incremental") as $payload_mode | if $sync_mode == "full" or $sync_mode == "incremental" then $sync_mode else $payload_mode end')
          if [ "$REQUESTED_SYNC_MODE" = "full" ] && [ "$SUPPORTS_FULL_SYNC" != "true" ]; then
            echo "::error title=全量更新不可用::Keep 暂不支持全量更新，请改用普通同步。"
            exit 1
          fi
          ACTION_PAYLOAD=$(jq -cn --arg raw "$RAW_ACTION_PAYLOAD" --arg sync_mode "$INPUT_SYNC_MODE" '($raw | fromjson? // {}) as $payload | ($payload.syncMode // $payload.sync_mode // "incremental") as $payload_mode | (if $sync_mode == "full" or $sync_mode == "incremental" then $sync_mode else $payload_mode end) as $mode | $payload + {syncMode:$mode,sync_mode:$mode}')
          if [ "$INPUT_REPAIR_AFTER_SYNC" = "true" ] || [ "$INPUT_REPAIR_AFTER_SYNC" = "false" ]; then
            ACTION_PAYLOAD=$(printf '%s' "$ACTION_PAYLOAD" | jq -c --arg value "$INPUT_REPAIR_AFTER_SYNC" '. + {repair_after_sync:($value == "true"),runSafeRepairAfterSync:($value == "true")}')
          fi
          export NOTIONHUB_ACTION_PAYLOAD="$ACTION_PAYLOAD"
          cd runner
          python - <<'PY'
          import json, os
          raw = os.environ.get('KEEP_CONFIG', '{}')
          try: values = json.loads(raw).values()
          except Exception: values = [raw]
          for value in values:
              escaped = str(value).replace('%', '%25').replace('\r', '%0D').replace('\n', '%0A')
              if escaped: print(f'::add-mask::{escaped}')
          PY
          echo "::notice title=Keep · ${{ matrix.label }}::开始读取数据并写入 Notion。"
          python -m notionhub_runner sync keep --stream "${{ matrix.key }}"
          echo "::notice title=Keep · ${{ matrix.label }}::同步完成。"

      - name: 查看补充日志
        if: always()
        run: |
          FOUND_LOG=0
          while IFS= read -r -d '' LOG_FILE; do
            FOUND_LOG=1
            echo "::group::$LOG_FILE"
            cat "$LOG_FILE"
            echo "::endgroup::"
          done < <(find runner/scripts -type f -path '*/log/*.log' -print0)
          if [ "$FOUND_LOG" -eq 0 ]; then echo "脚本已直接输出实时日志，没有额外日志文件。"; fi

  finalize:
    name: 完成 Keep 同步
    needs: [prepare, sync_streams]
    if: always() && needs.prepare.outputs.enabled == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      KEEP_CONFIG: ${{ secrets.KEEP_CONFIG }}
    steps:
      - name: 获取收尾程序
        if: needs.sync_streams.result == 'success'
        uses: actions/checkout@v5
        with:
          repository: malinkang/notionhub-private-runner
          ref: runner
          ssh-key: ${{ secrets.NOTIONHUB_RUNNER_SSH_KEY }}
          persist-credentials: false
          path: runner

      - name: 配置 Python 环境
        if: needs.sync_streams.result == 'success'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 安装收尾依赖
        if: needs.sync_streams.result == 'success'
        run: |
          python -m pip install --quiet --disable-pip-version-check --upgrade pip
          if [ -f runner/requirements.txt ]; then pip install --quiet --disable-pip-version-check -r runner/requirements.txt; fi
          SERVICE_REQUIREMENTS=$(cd runner && python -m notionhub_runner requirements keep)
          if [ -f "$SERVICE_REQUIREMENTS" ]; then pip install --quiet --disable-pip-version-check -r "$SERVICE_REQUIREMENTS"; fi

      - name: 执行同步后修复
        if: needs.sync_streams.result == 'success'
        env:
          PYTHONUNBUFFERED: '1'
          TZ: Asia/Shanghai
          NOTIONHUB_CONFIG_VERSION: '23'
          RAW_ACTION_PAYLOAD: ${{ github.event.inputs.payload || '{}' }}
          INPUT_SYNC_MODE: ${{ github.event.inputs.sync_mode || github.event.inputs.syncMode || '' }}
          INPUT_REPAIR_AFTER_SYNC: ${{ github.event.inputs.repair_after_sync || '' }}
          SYNC_PLAN: lifetime
          ENTITLEMENT_PLAN: lifetime
        run: |
          ACTION_PAYLOAD=$(jq -cn --arg raw "$RAW_ACTION_PAYLOAD" --arg sync_mode "$INPUT_SYNC_MODE" '($raw | fromjson? // {}) as $payload | ($payload.syncMode // $payload.sync_mode // "incremental") as $payload_mode | (if $sync_mode == "full" or $sync_mode == "incremental" then $sync_mode else $payload_mode end) as $mode | $payload + {syncMode:$mode,sync_mode:$mode}')
          if [ "$INPUT_REPAIR_AFTER_SYNC" = "true" ] || [ "$INPUT_REPAIR_AFTER_SYNC" = "false" ]; then
            ACTION_PAYLOAD=$(printf '%s' "$ACTION_PAYLOAD" | jq -c --arg value "$INPUT_REPAIR_AFTER_SYNC" '. + {repair_after_sync:($value == "true"),runSafeRepairAfterSync:($value == "true")}')
          fi
          export NOTIONHUB_ACTION_PAYLOAD="$ACTION_PAYLOAD"
          cd runner
          python -m notionhub_runner sync keep --finalize

      - name: 生成运行摘要
        if: always()
        env:
          STREAM_RESULT: ${{ needs.sync_streams.result }}
          EVENT_NAME: ${{ github.event_name }}
          RAW_ACTION_PAYLOAD: ${{ github.event.inputs.payload || '{}' }}
          INPUT_SYNC_MODE: ${{ github.event.inputs.sync_mode || github.event.inputs.syncMode || '' }}
        run: |
          if [ "$STREAM_RESULT" = "success" ]; then RESULT="同步成功"; else RESULT="同步失败"; fi
          if [ "$EVENT_NAME" = "schedule" ]; then TRIGGER="定时运行"; else TRIGGER="手动运行"; fi
          SYNC_MODE=$(jq -nr --arg raw "$RAW_ACTION_PAYLOAD" --arg input "$INPUT_SYNC_MODE" '($raw | fromjson? // {}) as $payload | if $input == "full" or $input == "incremental" then $input else ($payload.syncMode // $payload.sync_mode // "incremental") end')
          if [ "$SYNC_MODE" = "full" ]; then MODE_LABEL="全量更新"; else MODE_LABEL="增量同步"; fi
          {
            echo "## Keep同步"
            echo ""
            echo "| 项目 | 内容 |"
            echo "| --- | --- |"
            echo "| 结果 | $RESULT |"
            echo "| 模式 | $MODE_LABEL |"
            echo "| 触发方式 | $TRIGGER |"
            echo "| 运行记录 | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
          } >> "$GITHUB_STEP_SUMMARY"
          if [ "$STREAM_RESULT" != "success" ]; then
            echo "::error title=Keep同步失败::至少一个分类同步失败，后续分类和媒体处理已停止。"
            exit 1
          fi

  media:
    name: 下载上传 Keep 媒体
    needs: finalize
    if: needs.finalize.result == 'success'
    continue-on-error: true
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      KEEP_CONFIG: ${{ secrets.KEEP_CONFIG }}
    steps:
      - name: 获取媒体处理程序
        uses: actions/checkout@v5
        with:
          repository: malinkang/notionhub-private-runner
          ref: runner
          ssh-key: ${{ secrets.NOTIONHUB_RUNNER_SSH_KEY }}
          persist-credentials: false
          path: runner

      - name: 配置 Python 环境
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 安装媒体处理依赖
        run: |
          python -m pip install --quiet --disable-pip-version-check --upgrade pip
          if [ -f runner/requirements.txt ]; then pip install --quiet --disable-pip-version-check -r runner/requirements.txt; fi
          SERVICE_REQUIREMENTS=$(cd runner && python -m notionhub_runner requirements keep)
          if [ -f "$SERVICE_REQUIREMENTS" ]; then pip install --quiet --disable-pip-version-check -r "$SERVICE_REQUIREMENTS"; fi

      - name: 扫描媒体任务
        id: discover
        env:
          PYTHONUNBUFFERED: '1'
          TZ: Asia/Shanghai
          NOTIONHUB_CONFIG_VERSION: '23'
          NOTIONHUB_MEDIA_MANIFEST: ${{ runner.temp }}/notionhub-media.json
        run: |
          cd runner
          echo "::group::扫描媒体任务"
          python -m notionhub_runner media discover keep
          echo "::endgroup::"

      - name: 上传图片
        id: images
        if: steps.discover.outcome == 'success'
        continue-on-error: true
        env:
          PYTHONUNBUFFERED: '1'
          TZ: Asia/Shanghai
          NOTIONHUB_MEDIA_MANIFEST: ${{ runner.temp }}/notionhub-media.json
        run: |
          cd runner
          echo "::group::上传图片"
          python -m notionhub_runner media images keep
          echo "::endgroup::"

      - name: 上传大文件
        id: files
        if: always() && steps.discover.outcome == 'success'
        continue-on-error: true
        env:
          PYTHONUNBUFFERED: '1'
          TZ: Asia/Shanghai
          NOTIONHUB_MEDIA_MANIFEST: ${{ runner.temp }}/notionhub-media.json
        run: |
          cd runner
          echo "::group::上传大文件"
          python -m notionhub_runner media files keep
          echo "::endgroup::"

      - name: 汇总资源处理结果
        if: always()
        env:
          DISCOVER_OUTCOME: ${{ steps.discover.outcome }}
          IMAGE_OUTCOME: ${{ steps.images.outcome }}
          FILE_OUTCOME: ${{ steps.files.outcome }}
        run: |
          if [ "$DISCOVER_OUTCOME" != "success" ] || [ "$IMAGE_OUTCOME" = "failure" ] || [ "$FILE_OUTCOME" = "failure" ]; then
            echo "::warning title=部分资源处理失败::数据同步已经完成，失败的图片或文件会在下次同步后自动重试。"
            exit 0
          fi
          echo "::notice title=资源处理完成::图片和已开启的大文件均已处理。"

