name: 小红书

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 触发原因
        required: false
        default: manual
      action:
        description: 可选的 NotionHub 服务操作，例如修复操作名称
        required: false
        default: sync
      payload:
        description: 服务操作的可选 JSON 参数
        required: false
        default: '{}'
  schedule:
    - cron: '0 16 * * *'

concurrency:
  group: notionhub-xiaohongshu-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  NOTIONHUB_SERVICE: xiaohongshu
  NOTIONHUB_WORKFLOW_FILE: xiaohongshu.yml
  NOTIONHUB_CONFIG_VERSION: '12'
  NOTIONHUB_ACTION: ${{ github.event.inputs.action || 'sync' }}
  NOTIONHUB_ACTION_PAYLOAD: ${{ github.event.inputs.payload || '{}' }}

jobs:
  sync:
    name: 同步 小红书
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: 验证服务配置
        id: activation
        env:
          SERVICE_CONFIG: ${{ secrets.XIAOHONGSHU_CONFIG }}
        run: |
          if [ -z "$SERVICE_CONFIG" ]; then
            echo "::warning title=小红书尚未启用::缺少服务配置，本次运行已跳过。"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"
          if [ -z "${{ secrets.NOTIONHUB_RUN_TOKEN }}" ]; then
            echo "::error title=运行器配置缺失::缺少 NOTIONHUB_RUN_TOKEN，无法获取同步程序。"
            exit 1
          fi
          echo "::notice title=小红书::服务配置验证通过。"

      - name: 准备同步程序
        if: steps.activation.outputs.enabled == 'true'
        id: prepare
        env:
          NOTIONHUB_RUN_TOKEN: ${{ secrets.NOTIONHUB_RUN_TOKEN }}
          GITHUB_REPOSITORY_NAME: ${{ github.repository }}
        run: |
          PAYLOAD=$(jq -cn --arg service "xiaohongshu" --arg repository "$GITHUB_REPOSITORY_NAME" --arg workflow_file "xiaohongshu.yml" --arg config_version "12" '{service: $service, repository: $repository, workflowFile: $workflow_file, configVersion: $config_version}')
          TIMESTAMP=$(date +%s)
          NONCE=$(openssl rand -hex 16)
          BODY_SHA256=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -r | awk '{print $1}')
          SIGNING_PAYLOAD=$(printf 'POST\n/v1/github/runner/prepare\n%s\n%s\n%s' "$TIMESTAMP" "$NONCE" "$BODY_SHA256")
          SIGNATURE=$(printf '%s' "$SIGNING_PAYLOAD" | openssl dgst -sha256 -hmac "$NOTIONHUB_RUN_TOKEN" -r | awk '{print $1}')
          echo "::add-mask::$SIGNATURE"
          RESPONSE=$(curl -fsSL -X POST "https://i.notionhub.app/v1/github/runner/prepare"             -H "Authorization: Bearer $NOTIONHUB_RUN_TOKEN"             -H "Content-Type: application/json"             -H "X-NotionHub-Timestamp: $TIMESTAMP"             -H "X-NotionHub-Nonce: $NONCE"             -H "X-NotionHub-Signature: $SIGNATURE"             --data "$PAYLOAD")
          echo "redispatched=$(echo "$RESPONSE" | jq -r '.redispatched // false')" >> "$GITHUB_OUTPUT"
          REPO=$(echo "$RESPONSE" | jq -r '.repo // empty')
          REF=$(echo "$RESPONSE" | jq -r '.ref // empty')
          TOKEN=$(echo "$RESPONSE" | jq -r '.token // empty')
          if [ -n "$REPO" ]; then echo "repo=$REPO" >> "$GITHUB_OUTPUT"; fi
          if [ -n "$REF" ]; then echo "ref=$REF" >> "$GITHUB_OUTPUT"; fi
          if [ -n "$TOKEN" ]; then
            echo "::add-mask::$TOKEN"
            echo "token=$TOKEN" >> "$GITHUB_OUTPUT"
          fi
          echo "::notice title=运行器已就绪::同步程序配置检查完成。"

      - name: 完成工作流自动更新
        if: steps.activation.outputs.enabled == 'true' && steps.prepare.outputs.redispatched == 'true'
        run: echo "::notice title=工作流已更新::新版本已重新触发，本次旧配置运行结束。"

      - name: 获取同步程序
        if: steps.activation.outputs.enabled == 'true' && steps.prepare.outputs.redispatched != 'true'
        uses: actions/checkout@v5
        with:
          repository: ${{ steps.prepare.outputs.repo }}
          ref: ${{ steps.prepare.outputs.ref }}
          token: ${{ steps.prepare.outputs.token }}
          path: runner

      - name: 配置 Python 环境
        if: steps.activation.outputs.enabled == 'true' && steps.prepare.outputs.redispatched != 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: 安装运行依赖
        if: steps.activation.outputs.enabled == 'true' && steps.prepare.outputs.redispatched != 'true'
        run: |
          python -m pip install --quiet --disable-pip-version-check --upgrade pip
          if [ -f runner/requirements.txt ]; then pip install --quiet --disable-pip-version-check -r runner/requirements.txt; fi
          SERVICE_REQUIREMENTS=$(cd runner && python -m notionhub_runner requirements xiaohongshu)
          if [ -f "$SERVICE_REQUIREMENTS" ]; then pip install --quiet --disable-pip-version-check -r "$SERVICE_REQUIREMENTS"; fi

      - name: 同步 小红书
        id: sync
        if: steps.activation.outputs.enabled == 'true' && steps.prepare.outputs.redispatched != 'true'
        env:
          PYTHONUNBUFFERED: '1'
          TZ: Asia/Shanghai
          NOTIONHUB_SERVICE: xiaohongshu
          NOTIONHUB_ACTION: ${{ github.event.inputs.action || 'sync' }}
          NOTIONHUB_ACTION_PAYLOAD: ${{ github.event.inputs.payload || '{}' }}
          XIAOHONGSHU_CONFIG: ${{ secrets.XIAOHONGSHU_CONFIG }}
        run: |
          cd runner
          python - <<'PY'
          import json, os
          for value in json.loads(os.environ.get('XIAOHONGSHU_CONFIG', '{}')).values():
              escaped = str(value).replace(chr(37), '%25').replace(chr(13), '%0D').replace(chr(10), '%0A')
              if escaped:
                  print(f'::add-mask::{escaped}')
          PY
          echo "::notice title=小红书同步开始::正在读取数据并写入 Notion。"
          set +e
          python -m notionhub_runner sync xiaohongshu
          SYNC_EXIT=$?
          set -e
          if [ "$SYNC_EXIT" -eq 0 ]; then
            echo "::notice title=小红书同步成功::所有同步步骤均已完成。"
          else
            echo "::error title=小红书同步失败::同步程序退出码为 $SYNC_EXIT，请展开失败步骤查看日志。"
          fi
          exit "$SYNC_EXIT"

      - name: 查看补充日志
        if: always() && steps.activation.outputs.enabled == 'true' && steps.prepare.outputs.redispatched != 'true'
        run: |
          FOUND_LOG=0
          while IFS= read -r -d '' LOG_FILE; do
            FOUND_LOG=1
            echo "::group::$LOG_FILE"
            cat "$LOG_FILE"
            echo "::endgroup::"
          done < <(find runner/scripts -type f -path '*/log/*.log' -print0)
          if [ "$FOUND_LOG" -eq 0 ]; then echo "脚本已直接输出实时日志，没有额外日志文件。"; fi

      - name: 生成运行摘要
        if: always()
        env:
          SYNC_OUTCOME: ${{ steps.sync.outcome }}
          REDISPATCHED: ${{ steps.prepare.outputs.redispatched }}
          EVENT_NAME: ${{ github.event_name }}
          ACTION_NAME: ${{ github.event.inputs.action || 'sync' }}
        run: |
          if [ "$REDISPATCHED" = "true" ]; then
            RESULT="已更新工作流并重新触发"
          else
            case "$SYNC_OUTCOME" in
              success) RESULT="同步成功" ;;
              failure) RESULT="同步失败" ;;
              cancelled) RESULT="已取消" ;;
              skipped) RESULT="已跳过" ;;
              *) RESULT="未执行" ;;
            esac
          fi
          if [ "$EVENT_NAME" = "schedule" ]; then TRIGGER="定时运行"; else TRIGGER="手动运行"; fi
          {
            echo "## 小红书同步"
            echo ""
            echo "| 项目 | 内容 |"
            echo "| --- | --- |"
            echo "| 结果 | $RESULT |"
            echo "| 触发方式 | $TRIGGER |"
            echo "| 执行动作 | $ACTION_NAME |"
            echo "| 运行记录 | [#${{ github.run_number }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) |"
          } >> "$GITHUB_STEP_SUMMARY"
